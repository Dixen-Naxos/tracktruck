name: track_cam
description: "Dashcam simulation app with 5-minute segmented recording and GCS upload"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Camera
  camera: ^0.11.0+2

  # File system
  path_provider: ^2.1.0
  path: ^1.9.1

  # Upload / networking
  dio: ^5.4.0
  sqflite: ^2.3.0
  connectivity_plus: ^6.0.0

  # UI / UX
  wakelock_plus: ^1.2.0
  intl: ^0.20.2

  # Permissions
  permission_handler: ^11.0.0

  # Firebase / Auth
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
